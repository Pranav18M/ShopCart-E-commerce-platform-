# ── Server ──
server.port=8080
server.servlet.context-path=/

# ── Database ──
spring.datasource.url=jdbc:mysql://localhost:3306/shopkart_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Pranav_018
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ──
app.jwt.secret=ShopKartSecretKeyForJWTSigningMustBe256BitsOrMoreForHS256Algorithm2024!
app.jwt.expiration=86400000

# ── File Upload ──
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
app.upload.dir=src/main/resources/static/uploads

# ── CORS ──
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# ── Logging ──
logging.level.com.ecommerce=DEBUG
logging.level.org.springframework.security=WARN
