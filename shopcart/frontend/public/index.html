<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2874f0" />
    <meta name="description" content="ShopKart - India's Most Trusted Online Shopping Platform" />
    <meta name="referrer" content="no-referrer" />
    <title>Shopix - Online Shopping</title>
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/title.logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      // Fix 404 on page refresh for React Router (SPA redirect fix)
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
